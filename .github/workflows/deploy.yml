name: Deploy

# Автодеплой: каждый push в master заходит на сервер по SSH, подтягивает свежий
# master и пересобирает стек. Секреты репозитория (Settings → Secrets → Actions):
#   SERVER_HOST, SERVER_USER, SSH_PRIVATE_KEY  — обязательны;
#   SERVER_PORT (по умолчанию 22), INSTALL_DIR (по умолчанию /opt/urist_bot) — необязательны.
# .env на сервере НЕ трогаем — он создан install.sh и хранит боевые ключи.
on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script: |
            set -e
            cd ${{ secrets.INSTALL_DIR || '/opt/urist_bot' }}
            git fetch --all
            git reset --hard origin/master
            docker compose up -d --build
            docker image prune -f
